# ============================================================================
# CI — RetailUI (Angular frontend, standalone repo)
# Every push/PR: clean install from lockfile + production build.
# Built dist/ is uploaded as an artifact on main.
#
# Assumes package.json is at the repo ROOT. If the app lives in a subfolder
# (e.g. retail-ng/), set working-directory and cache-dependency-path to it.
# ============================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json   # adjust if nested

      - name: Install (clean, from lockfile)
        run: npm ci                                   # add working-directory if nested

      - name: Build (production)
        run: npx ng build --configuration production

      # Add when the first spec file exists:
      # - name: Unit tests
      #   run: npx ng test --watch=false --browsers ChromeHeadless

      - name: Upload built frontend
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7
